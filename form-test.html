<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار النموذج</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        label { display: block; margin: 12px 0 4px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        button { margin-top: 16px; padding: 12px 24px; background: #705732; color: #fff; border: 0; border-radius: 6px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <h1>اختبار نموذج Netlify</h1>
    <p>هذا نموذج اختبار بسيط للتأكد من عمل Netlify Forms.</p>

    <form name="test-form" method="POST" data-netlify="true" action="/form-success.html">
        <input type="hidden" name="form-name" value="test-form">
        <label for="t-name">الاسم</label>
        <input type="text" id="t-name" name="name" required>

        <label for="t-email">البريد</label>
        <input type="email" id="t-email" name="email" required>

        <label for="t-msg">الرسالة</label>
        <textarea id="t-msg" name="message" rows="4" required></textarea>

        <button type="submit">إرسال الاختبار</button>
    </form>
</body>
</html>
