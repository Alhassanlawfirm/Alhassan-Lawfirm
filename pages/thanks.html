<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الإرسال - الحسن للمحاماة</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="../images/logo.png">
    <link rel="stylesheet" href="../css/combine.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .thanks-wrap {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1.5rem;
        }
        .thanks-card {
            max-width: 560px;
            background: #fff;
            border-radius: 16px;
            padding: 3rem 2.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .thanks-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #705732, #ac864c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thanks-icon i { font-size: 2.5rem; color: #fff; }
        .thanks-card h1 { font-size: 1.8rem; color: #3b2a11; margin-bottom: 1rem; }
        .thanks-card p { color: #666; line-height: 1.8; margin-bottom: 2rem; font-size: 1.05rem; }
        .thanks-btn {
            display: inline-block;
            background: linear-gradient(135deg, #705732, #ac864c);
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .thanks-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(112,87,50,0.3); }
    </style>
</head>
<body>
    <div class="thanks-wrap">
        <div class="thanks-card">
            <div class="thanks-icon"><i class="fas fa-check"></i></div>
            <h1>تم إرسال رسالتك بنجاح</h1>
            <p>شكراً لتواصلك مع مكتب الحسن للمحاماة. لقد استلمنا رسالتك وسنقوم بالرد عليك في أقرب وقت ممكن خلال ساعات العمل الرسمية.</p>
            <a class="thanks-btn" href="../index.html">العودة للصفحة الرئيسية</a>
        </div>
    </div>
</body>
</html>
